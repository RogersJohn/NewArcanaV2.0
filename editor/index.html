<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Arcana — Card Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .input { display: block; width: 100%; padding: 0.25rem 0.5rem; margin-top: 0.25rem; font-size: 0.875rem; background: #1f2937; border: 1px solid #4b5563; border-radius: 0.25rem; color: #e5e7eb; }
    .input:focus { outline: none; border-color: #d97706; }
    .btn-primary { padding: 0.375rem 1rem; font-size: 0.875rem; font-weight: 500; background: #d97706; color: white; border-radius: 0.25rem; cursor: pointer; border: none; }
    .btn-primary:hover { background: #b45309; }
    .btn-secondary { padding: 0.375rem 1rem; font-size: 0.875rem; font-weight: 500; background: #374151; color: #d1d5db; border-radius: 0.25rem; cursor: pointer; border: none; }
    .btn-secondary:hover { background: #4b5563; }
    .btn-danger { padding: 0.375rem 1rem; font-size: 0.875rem; font-weight: 500; background: #7f1d1d; color: #fca5a5; border-radius: 0.25rem; cursor: pointer; border: none; }
    .btn-danger:hover { background: #991b1b; }
    .tooltip-wrap { position: relative; display: inline-flex; align-items: center; cursor: help; }
    .tooltip-icon { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; font-size: 10px; font-weight: 700; background: #4b5563; color: #d1d5db; border-radius: 50%; line-height: 1; }
    .tooltip-text { visibility: hidden; opacity: 0; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #111827; color: #e5e7eb; font-size: 12px; line-height: 1.4; padding: 6px 10px; border-radius: 6px; border: 1px solid #374151; max-width: 300px; width: max-content; white-space: pre-line; z-index: 50; pointer-events: none; transition: opacity 0.15s 0.2s; }
    .tooltip-wrap:hover .tooltip-text { visibility: visible; opacity: 1; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
